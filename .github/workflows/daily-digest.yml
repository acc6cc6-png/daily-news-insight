name: Daily Digest

on:
  schedule:
    - cron: "5 23 * * *" # Asia/Shanghai 每天 07:05
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build digest
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
        run: python scripts/daily_digest.py

      - name: Commit generated data
        run: |
          git config user.name "daily-news-bot"
          git config user.email "daily-news-bot@users.noreply.github.com"
          git add docs/data
          git commit -m "chore: refresh daily digest" || exit 0
          git pull --rebase origin main
          git push
